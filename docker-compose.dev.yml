services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: okrtracker
      POSTGRES_USER: okrtracker
      POSTGRES_PASSWORD: okrtracker
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    env_file:
      - ./backend/.env
    environment:
      ALLOWED_HOSTS: 127.0.0.1,localhost,backend
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:3000,http://localhost:3000,http://127.0.0.1:8080,http://localhost:8080,https://127.0.0.1:8080,https://localhost:8080
      CSRF_TRUSTED_ORIGINS: http://127.0.0.1:8080,http://localhost:8080,https://127.0.0.1:8080,https://localhost:8080
    command: uv run python manage.py runserver 0.0.0.0:8000
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '8000'
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      NUXT_PUBLIC_API_BASE: https://localhost:8080/api
      CHOKIDAR_USEPOLLING: 'true'
    command: npm run dev -- --host 0.0.0.0 --port 3000
    expose:
      - '3000'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    depends_on:
      - frontend
      - backend
    ports:
      - '8080:443'
      - '8081:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs/local:/etc/nginx/certs

volumes:
  backend_venv:
  frontend_node_modules:
  postgres_data:
